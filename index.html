<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advisory Pricing Calculator</title>
<style>
/* ── SLDS-faithful base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Salesforce Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f3f2f2;
  color: #181818;
  font-size: 0.875rem;
  min-height: 100vh;
}

/* ── App shell ── */
.app-bar {
  background: #0070d2;
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 1rem;
  color: #fff;
  font-size: 0.875rem;
  font-weight: 700;
  gap: 10px;
  box-shadow: 0 2px 4px rgba(0,0,0,.2);
}
.app-bar-icon {
  width: 28px; height: 28px;
  background: #fff;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #0070d2;
  font-size: 16px;
  font-weight: 900;
}
.page { max-width: 960px; margin: 1.5rem auto; padding: 0 1rem 4rem; }

/* ── Lightning Card ── */
.lightning-card {
  background: #fff;
  border-radius: 4px;
  box-shadow: 0 2px 4px rgba(0,0,0,.12);
  overflow: hidden;
}
.card-header {
  border-bottom: 1px solid #dddbda;
  padding: 0.75rem 1rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-header-icon {
  width: 32px; height: 32px; border-radius: 6px;
  background: #f4bc25;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.card-header-title {
  font-size: 1rem;
  font-weight: 700;
  color: #16325c;
}
.card-body { padding: 0; }

/* ── SLDS spacing helpers ── */
.slds-p-around_large  { padding: 1.5rem; }
.slds-p-around_medium { padding: 1rem; }
.slds-m-bottom_large  { margin-bottom: 1.5rem; }
.slds-m-bottom_medium { margin-bottom: 1rem; }
.slds-m-bottom_small  { margin-bottom: 0.5rem; }
.slds-m-top_medium    { margin-top: 1rem; }
.slds-m-around_small  { margin: 0.5rem; }
.slds-p-top_medium    { padding-top: 1rem; }
.slds-text-align_center { text-align: center; }

/* ── SLDS grid ── */
.slds-grid { display: flex; flex-wrap: wrap; }
.slds-gutters { margin-left: -0.5rem; margin-right: -0.5rem; }
.slds-gutters > .slds-col { padding-left: 0.5rem; padding-right: 0.5rem; }
.slds-wrap { flex-wrap: wrap; }
.slds-grid_align-center { justify-content: center; }
.slds-grid_align-spread { justify-content: space-between; }
.slds-no-flex { flex: none; }
.slds-col { flex: 1 1 0%; min-width: 0; }
.slds-size_1-of-1   { flex: 0 0 100%; max-width: 100%; }
.slds-size_1-of-4   { flex: 0 0 25%;  max-width: 25%; }
.slds-medium-size_1-of-3 { flex: 0 0 33.333%; max-width: 33.333%; }
.slds-medium-size_1-of-2 { flex: 0 0 50%;     max-width: 50%; }
.slds-large-size_1-of-3  { flex: 0 0 33.333%; max-width: 33.333%; }

/* ── SLDS typography ── */
.slds-text-heading_medium { font-size: 1.25rem; font-weight: 700; color: #16325c; }
.slds-text-heading_small  { font-size: 1rem;    font-weight: 700; color: #16325c; }
.slds-text-body_regular   { font-size: 0.875rem; color: #54698d; }
.slds-text-color_weak     { color: #54698d; }

/* ── SLDS box / shade ── */
.slds-box {
  border: 1px solid #dddbda;
  border-radius: 4px;
  padding: 1rem;
}
.slds-theme_shade { background: #f3f2f2; }

/* ── Lightning Button ── */
.lbtn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  border: 1px solid transparent;
  font-size: 0.8125rem;
  font-weight: 700;
  padding: 0 1rem;
  height: 32px;
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s;
  white-space: nowrap;
  text-decoration: none;
  font-family: inherit;
}
.lbtn-brand {
  background: #0070d2;
  border-color: #0070d2;
  color: #fff;
}
.lbtn-brand:hover { background: #005fb2; border-color: #005fb2; }
.lbtn-brand:focus { outline: none; box-shadow: 0 0 0 3px #d8edff; }
.lbtn-neutral {
  background: #fff;
  border-color: #dddbda;
  color: #0070d2;
}
.lbtn-neutral:hover { background: #f4f6f9; }
.lbtn-neutral:focus { outline: none; box-shadow: 0 0 0 3px #d8edff; }
.btn-full-width { width: 100%; }

/* ── Lightning Input ── */
.linput { display: flex; flex-direction: column; gap: 4px; margin-bottom: 0.75rem; }
.linput label {
  font-size: 0.75rem;
  font-weight: 700;
  color: #3e3e3c;
}
.linput input[type=number],
.linput input[type=text] {
  height: 32px;
  border: 1px solid #dddbda;
  border-radius: 4px;
  padding: 0 8px;
  font-size: 0.8125rem;
  color: #181818;
  background: #fff;
  font-family: inherit;
  transition: border-color 0.15s;
  width: 100%;
}
.linput input:focus {
  outline: none;
  border-color: #0070d2;
  box-shadow: 0 0 0 1px #0070d2;
}
/* Checkbox row */
.linput-check {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0.75rem;
  padding-top: 1.25rem;
}
.linput-check input[type=checkbox] {
  width: 16px; height: 16px;
  accent-color: #0070d2;
  cursor: pointer;
}
.linput-check label {
  font-size: 0.8125rem;
  font-weight: 700;
  color: #3e3e3c;
  cursor: pointer;
}

/* ── Result tiles (verbatim from user CSS) ── */
.btn-full-width lightning-button { width: 100%; }

.result-tile {
  background: white;
  border-radius: 4px;
  padding: 12px 16px;
  margin-bottom: 12px;
  border-left: 4px solid #0070d2;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.result-label {
  font-size: 0.75rem;
  color: #54698d;
  margin: 0 0 4px 0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.result-value {
  font-size: 1.1rem;
  font-weight: 600;
  margin: 0;
  color: #16325c;
}
.result-ok   { color: #2e844a; }
.result-warn { color: #dd7a01; }
.result-bad  { color: #ba0517; }

/* ── Illustration (generational in-dev screen) ── */
.slds-illustration {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1rem;
}
.illus-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: #e8f4ff;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .slds-medium-size_1-of-3 { flex: 0 0 100%; max-width: 100%; }
  .slds-medium-size_1-of-2 { flex: 0 0 100%; max-width: 100%; }
  .slds-large-size_1-of-3  { flex: 0 0 100%; max-width: 100%; }
  .slds-size_1-of-4        { flex: 0 0 100%; max-width: 100%; }
}
</style>
</head>
<body>

<!-- App bar -->
<div class="app-bar">
  <div class="app-bar-icon">&#9673;</div>
  BFE Advisory
</div>

<div class="page">
<div class="lightning-card">

  <!-- Card header -->
  <div class="card-header">
    <div class="card-header-icon">&#128200;</div>
    <span class="card-header-title">Advisory Pricing Calculator</span>
  </div>

  <div class="card-body" id="root"></div>

</div><!-- /lightning-card -->
</div><!-- /page -->


<script>
// ═══════════════════════════════════════════════════════
//  STATE  (mirrors LWC @track properties)
// ═══════════════════════════════════════════════════════

const state = {
  householdType: null,    // null | 'standard' | 'generational'
  acctAUM:      0,
  hhAUMTotal:   0,
  acFees:       0,
  newmin:       0,
  grossRevenue: 0,
  netRevenue:   0,
  isSMAFixed:   false,
  resultsReady: false,
  results:      {},
};

// ═══════════════════════════════════════════════════════
//  FEE TIER HELPERS  (exact SQL Section 1)
// ═══════════════════════════════════════════════════════

function smaFixedFee(a) {
  a = a || 0;
  if (a < 250000)  return a * 75 / 10000;
  if (a < 1000000) return 1875  + (a - 250000)  * 60 / 10000;
  if (a < 2000000) return 6375  + (a - 1000000) * 50 / 10000;
  if (a < 4000000) return 11375 + (a - 2000000) * 40 / 10000;
  if (a < 7000000) return 19375 + (a - 4000000) * 30 / 10000;
  return 28375 + (a - 7000000) * 25 / 10000;
}

function advFee(a) {
  a = a || 0;
  if (a < 250000)  return a * 100 / 10000;
  if (a < 1000000) return 2500  + (a - 250000)  * 80 / 10000;
  if (a < 2000000) return 8500  + (a - 1000000) * 60 / 10000;
  if (a < 4000000) return 14500 + (a - 2000000) * 40 / 10000;
  if (a < 7000000) return 22500 + (a - 4000000) * 30 / 10000;
  return 31500 + (a - 7000000) * 25 / 10000;
}

function overheadFee(a) {
  a = a || 0;
  if (a < 250000)  return a * 38 / 10000;
  if (a < 1000000) return 950  + (a - 250000)  * 31 / 10000;
  if (a < 2000000) return 3275 + (a - 1000000) * 23 / 10000;
  if (a < 4000000) return 5575 + (a - 2000000) * 15 / 10000;
  if (a < 7000000) return 8575 + (a - 4000000) * 11 / 10000;
  return 11875 + (a - 7000000) * 9 / 10000;
}

// ═══════════════════════════════════════════════════════
//  CORE CALCULATION  (mirrors LWC calculate() + SQL §1-3)
// ═══════════════════════════════════════════════════════

function calculate() {
  const acctAUM    = state.acctAUM;
  const hhAUM      = state.hhAUMTotal;  // used as both HHAdvAUMTotal and HHAUMTotal
  const acFees     = state.acFees;
  const newmin     = state.newmin;
  const isSMA      = state.isSMAFixed;

  // § 1 – HH-level fee schedules
  const smaFixed_HH = smaFixedFee(hhAUM);
  const adv_HH      = advFee(hhAUM);

  // § 2a – AcctMinBPNoHHDiscounts
  const acctMinDollar = isSMA ? smaFixedFee(acctAUM) : advFee(acctAUM);
  const acctMinBP     = (acctMinDollar / (acctAUM || 1)) * 10000;

  // § 2b – MinWithHHdiscounts
  // HH base rate in bps (using HH advisory AUM as denominator)
  const hhBaseFee = isSMA ? smaFixed_HH : adv_HH;
  const hhBaseBP  = (hhBaseFee / (hhAUM || 1)) * 10000;

  // Per-account overhead / HH advisory AUM  (E.OverheadNoDiscounts / HHAdvAUMTotal)
  const acctOverheadBP = (overheadFee(acctAUM) / (hhAUM || 1)) * 10000;

  // HH blended overhead rate using total HH AUM  (overheadFee(HHAUMTotal) / HHAUMTotal)
  const hhOverheadBP = (overheadFee(hhAUM) / (hhAUM || 1)) * 10000;

  const minWithHH = hhBaseBP - (acctOverheadBP - hhOverheadBP);

  // § 3 – Participation & pay rate
  // QualifiesForHHDiscount: HHAUMTotal >= 1,000,000
  const qualifies = hhAUM >= 1000000;

  const estPartAcct = Math.max(0, acctMinBP + newmin - acFees);
  const estPartHH   = Math.max(0, minWithHH  + newmin - acFees);

  const participationMinFee = qualifies ? minWithHH  : acctMinBP;
  const estParticipation    = qualifies ? estPartHH  : estPartAcct;

  // PayRate – exact SQL CASE logic
  let payRate;
  if      (qualifies  && estPartHH   > 50) payRate = 0;
  else if (!qualifies && estPartAcct > 50) payRate = 0;
  else if (qualifies)                      payRate = 0.5 - (estPartHH   / 100);
  else                                     payRate = 0.5 - (estPartAcct / 100);

  // ChangeinNet = ROUND((ParticipationPayRate * GrossRevenue) – NetRevenue, 2)
  const changeInNet = Math.round(
    ((payRate * state.grossRevenue) - state.netRevenue) * 100
  ) / 100;

  state.results = {
    qualifiesForHHDiscount : qualifies ? 'Yes' : 'No',
    acctMinBPNoHHDiscounts : acctMinBP.toFixed(2) + ' bps',
    minWithHHDiscounts     : minWithHH.toFixed(2) + ' bps',
    participationMinimumFee: participationMinFee.toFixed(2) + ' bps',
    estimatedParticipation : estParticipation.toFixed(2) + ' bps',
    participationPayRate   : (payRate * 100).toFixed(1) + '%',
    changeInNet            : '$' + changeInNet.toLocaleString('en-US', { minimumFractionDigits: 2 }),
    participationClass     : estParticipation > 0  ? 'result-warn' : 'result-ok',
    payRateClass           : payRate === 0         ? 'result-bad'  : 'result-ok',
    changeClass            : changeInNet < 0       ? 'result-bad'  : 'result-ok',
  };
  state.resultsReady = true;
  render();
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════

function selectStandard()     { state.householdType = 'standard';     state.resultsReady = false; render(); }
function selectGenerational() { state.householdType = 'generational'; render(); }
function goBack()             { state.householdType = null;            state.resultsReady = false; render(); }

// ═══════════════════════════════════════════════════════
//  INPUT HANDLERS
// ═══════════════════════════════════════════════════════

function handleAcctAUM(e)      { state.acctAUM      = parseFloat(e.target.value) || 0; }
function handleHHAUM(e)        { state.hhAUMTotal   = parseFloat(e.target.value) || 0; }
function handleAcFees(e)       { state.acFees       = parseFloat(e.target.value) || 0; }
function handleNewmin(e)       { state.newmin       = parseFloat(e.target.value) || 0; }
function handleGrossRevenue(e) { state.grossRevenue = parseFloat(e.target.value) || 0; }
function handleNetRevenue(e)   { state.netRevenue   = parseFloat(e.target.value) || 0; }
function handleSMAFixed(e)     { state.isSMAFixed   = e.target.checked; }

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════

function render() {
  const root = document.getElementById('root');
  const ht   = state.householdType;

  if (!ht) {
    root.innerHTML = renderLanding();
  } else if (ht === 'generational') {
    root.innerHTML = renderGenerational();
  } else {
    root.innerHTML = renderStandard();
  }
}

// ── Landing ──────────────────────────────────────────────────────────────

function renderLanding() {
  return `
  <div class="slds-p-around_large slds-text-align_center">
    <h2 class="slds-text-heading_medium slds-m-bottom_large">
      Select Household Type
    </h2>
    <div class="slds-grid slds-gutters slds-grid_align-center">
      <div class="slds-col slds-size_1-of-4">
        <button class="lbtn lbtn-brand btn-full-width slds-m-around_small"
                onclick="selectStandard()">
          Standard Household
        </button>
      </div>
      <div class="slds-col slds-size_1-of-4">
        <button class="lbtn lbtn-neutral btn-full-width slds-m-around_small"
                onclick="selectGenerational()">
          Generational Household
        </button>
      </div>
    </div>
  </div>`;
}

// ── Generational: still in development ───────────────────────────────────

function renderGenerational() {
  return `
  <div class="slds-p-around_large slds-text-align_center">
    <div class="slds-illustration slds-m-bottom_medium">
      <div class="illus-icon">&#128295;</div>
    </div>
    <h2 class="slds-text-heading_medium slds-m-bottom_small">Still in Development</h2>
    <p class="slds-text-body_regular slds-text-color_weak slds-m-bottom_large">
      Generational Household pricing is coming soon.
    </p>
    <button class="lbtn lbtn-neutral" onclick="goBack()">&#8592; Back</button>
  </div>`;
}

// ── Standard Household Calculator ────────────────────────────────────────

function renderStandard() {
  const r = state.results;
  return `
  <div class="slds-p-around_medium">

    <!-- Header row -->
    <div class="slds-grid slds-gutters slds-m-bottom_medium slds-grid_align-spread">
      <div class="slds-col">
        <h2 class="slds-text-heading_small">Standard Household Calculator</h2>
      </div>
      <div class="slds-col slds-no-flex">
        <button class="lbtn lbtn-neutral" onclick="goBack()">&#8592; Back</button>
      </div>
    </div>

    <!-- Inputs -->
    <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_medium">

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
        <div class="linput">
          <label>Account AUM ($)</label>
          <input type="number" value="${state.acctAUM || ''}"
                 placeholder="0" step="1000" min="0"
                 oninput="handleAcctAUM(event)" />
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
        <div class="linput">
          <label>Total HH AUM ($)</label>
          <input type="number" value="${state.hhAUMTotal || ''}"
                 placeholder="0" step="1000" min="0"
                 oninput="handleHHAUM(event)" />
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
        <div class="linput">
          <label>Actual Client Fee (bps)</label>
          <input type="number" value="${state.acFees || ''}"
                 placeholder="0" step="0.01" min="0"
                 oninput="handleAcFees(event)" />
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
        <div class="linput">
          <label>Manager Fee Add-on (newmin, bps)</label>
          <input type="number" value="${state.newmin || ''}"
                 placeholder="0" step="0.01" min="0"
                 oninput="handleNewmin(event)" />
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
        <div class="linput">
          <label>Gross Revenue ($)</label>
          <input type="number" value="${state.grossRevenue || ''}"
                 placeholder="0" step="100" min="0"
                 oninput="handleGrossRevenue(event)" />
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
        <div class="linput">
          <label>Net Revenue (standard discount, $)</label>
          <input type="number" value="${state.netRevenue || ''}"
                 placeholder="0" step="100" min="0"
                 oninput="handleNetRevenue(event)" />
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
        <div class="linput-check">
          <input type="checkbox" id="smaCheck"
                 ${state.isSMAFixed ? 'checked' : ''}
                 onchange="handleSMAFixed(event)" />
          <label for="smaCheck">SMA Fixed-Fee Account?</label>
        </div>
      </div>

    </div><!-- /inputs grid -->

    <button class="lbtn lbtn-brand slds-m-bottom_medium"
            onclick="calculate()">
      Calculate
    </button>

    <!-- Results -->
    ${state.resultsReady ? renderResults(r) : ''}

  </div>`;
}

// ── Results tiles ─────────────────────────────────────────────────────────

function renderResults(r) {
  return `
  <div class="slds-box slds-theme_shade slds-m-top_medium">
    <h3 class="slds-text-heading_small slds-m-bottom_medium">Results</h3>

    <div class="slds-grid slds-gutters slds-wrap">

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
        <div class="result-tile">
          <p class="result-label">Qualifies for HH Discount</p>
          <p class="result-value">${r.qualifiesForHHDiscount}</p>
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
        <div class="result-tile">
          <p class="result-label">Acct Minimum (No HH Discount, bps)</p>
          <p class="result-value">${r.acctMinBPNoHHDiscounts}</p>
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
        <div class="result-tile">
          <p class="result-label">Minimum with HH Discount (bps)</p>
          <p class="result-value">${r.minWithHHDiscounts}</p>
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
        <div class="result-tile">
          <p class="result-label">Participation Minimum Fee (bps)</p>
          <p class="result-value">${r.participationMinimumFee}</p>
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
        <div class="result-tile">
          <p class="result-label">Estimated Participation Gap (bps)</p>
          <p class="result-value ${r.participationClass}">${r.estimatedParticipation}</p>
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
        <div class="result-tile">
          <p class="result-label">Participation Pay Rate</p>
          <p class="result-value ${r.payRateClass}">${r.participationPayRate}</p>
        </div>
      </div>

      <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
        <div class="result-tile">
          <p class="result-label">Change in Net Revenue ($)</p>
          <p class="result-value ${r.changeClass}">${r.changeInNet}</p>
        </div>
      </div>

    </div>
  </div>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
